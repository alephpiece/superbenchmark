# HuggingFace Model Integration - Example Configuration
# This file demonstrates how to use HuggingFace models in SuperBench

superbench:
  version: v0.10
  
  superbench:
    enable:
      - tensorrt-inference
      - ort-inference
    
    var:
      # Example 1: In-house model (existing behavior)
      inhouse_models:
        - model_identifier: 'bert-large'
          model_source: 'in-house'
          batch_size: 32
          seq_length: 512
          precision: 'fp16'
      
      # Example 2: HuggingFace public model
      hf_public_models:
        - model_identifier: 'bert-base-uncased'
          model_source: 'huggingface'
          batch_size: 32
          seq_length: 512
          precision: 'fp16'
          torch_dtype: 'float16'
        
        - model_identifier: 'gpt2'
          model_source: 'huggingface'
          batch_size: 16
          seq_length: 1024
          precision: 'fp16'
      
      # Example 3: HuggingFace model with authentication (for gated models)
      hf_gated_models:
        - model_identifier: 'meta-llama/Llama-2-7b-hf'
          model_source: 'huggingface'
          batch_size: 8
          seq_length: 2048
          precision: 'fp16'
          hf_token: '${HF_TOKEN}'  # Environment variable
        
        - model_identifier: 'meta-llama/Llama-2-13b-hf'
          model_source: 'huggingface'
          batch_size: 4
          seq_length: 2048
          precision: 'fp16'
          hf_token: '${HF_TOKEN}'
      
      # Example 4: Latest models (Qwen, DeepSeek)
      latest_models:
        - model_identifier: 'Qwen/Qwen2.5-7B-Instruct'
          model_source: 'huggingface'
          batch_size: 8
          seq_length: 4096
          precision: 'fp16'
          torch_dtype: 'float16'
          trust_remote_code: false
        
        - model_identifier: 'deepseek-ai/deepseek-coder-6.7b-instruct'
          model_source: 'huggingface'
          batch_size: 8
          seq_length: 2048
          precision: 'fp16'
      
      # Example 5: Comparison mode (in-house vs HuggingFace)
      comparison_models:
        - model_identifier: 'bert-large'
          model_source: 'in-house'
          batch_size: 32
          seq_length: 512
        
        - model_identifier: 'bert-large-uncased'
          model_source: 'huggingface'
          batch_size: 32
          seq_length: 512
    
    # Benchmark configuration
    benchmarks:
      tensorrt-inference:
        enable: true
        timeout: 3600
        modes:
          - name: benchmark
            enable: true
            parameters:
              iterations: 1000
              warmup: 100
      
      ort-inference:
        enable: true
        timeout: 3600
        modes:
          - name: benchmark
            enable: true
            parameters:
              iterations: 1000
              warmup: 100
              graph_opt_level: 3

# Environment variables needed:
# - HF_TOKEN: HuggingFace authentication token for private/gated models
# - CUDA_VISIBLE_DEVICES: GPU devices to use

# Usage examples:
# 1. Run with public models:
#    sb run --config hf_models_example.yaml
#
# 2. Run with gated models (set token first):
#    export HF_TOKEN=your_token_here
#    sb run --config hf_models_example.yaml
#
# 3. Validate model before running:
#    sb validate-model Qwen/Qwen2.5-7B-Instruct
#
# 4. List supported architectures:
#    sb list-models --source huggingface
