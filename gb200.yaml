      - gpt2-small
      parameters:
        <<: *model_ddp_param
        precision: [float32]
        batch_size: 128
        num_steps: 256
        enable_determinism: true
        deterministic_seed: 42
        generate_log: ./outputs/gpt_deterministic_ref.json
        check_frequency: 50
    model-benchmarks:gpt-deterministic-compare:
      # model-benchmarks:bert@base-fp32:
      <<: *default_pytorch_mode
      timeout: 3000
      models:
      - gpt2-small
      parameters:
        <<: *model_ddp_param
        precision: [float32]
        batch_size: 128
        num_steps: 256
        enable_determinism: true
        deterministic_seed: 42
        check_frequency: 50
        compare_log: ./outputs/gpt_deterministic_ref.json
    model-benchmarks:llama-deterministic-generate:
      <<: *default_pytorch_mode
      timeout: 1800
      models:
      - llama2-7b
      parameters:
        <<: *model_ddp_param
        precision: [float32]
        batch_size: 128
        num_steps: 256
        seq_len: 224
        enable_determinism: true
        deterministic_seed: 42
        generate_log: ./outputs/llama_deterministic_ref.json
        check_frequency: 50
    model-benchmarks:llama-deterministic-compare:
      # model-benchmarks:bert@base-fp32:
      <<: *default_pytorch_mode
      timeout: 1800
      models:
